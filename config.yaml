# Toeic Brain 전역 설정

project:
  name: "Toeic Brain"
  version: "2.0.0"
  description: "ETS 기출문제 + 노랭이 단어장 → Anki 학습 시스템"

paths:
  reference: "00. Reference"
  json_data: "data/json"
  json_questions: "data/json/questions"
  json_vocab: "data/json/hackers_vocab.json"
  json_word_examples: "data/json/word_ets_examples.json"
  anki_data: "data/anki"
  output: "output"
  templates: "scripts/anki/templates"
  styles: "scripts/anki/styles"

ets:
  volumes: [1, 2, 3, 4, 5]
  parts: [5, 6, 7]

vocab:
  source_files:
    basic: "00. Reference/hackers_vocab_basic.xlsx"
    score_800: "00. Reference/hackers_vocab_800.xlsx"
    score_900: "00. Reference/hackers_vocab_900.xlsx"
  total_days: 30

anki:
  vocab_deck:
    name: "Toeic Brain::단어장"
    id: 2026032901
  part5_deck:
    name: "Toeic Brain::Part5 기출"
    id: 2026032902

categories:
  - "품사"
  - "동사시제/태"
  - "접속사/전치사"
  - "관계대명사"
  - "어휘"
  - "대명사"
  - "비교급/최상급"
  - "기타문법"
