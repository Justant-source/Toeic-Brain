<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div class="card">

  <!-- Word -->
  <div class="word-main">{{Word}}</div>

  <!-- Part of Speech -->
  <div style="text-align: center; margin-top: 6px;">
    <span class="pos-badge">{{POS}}</span>
  </div>

  <hr class="section-divider">

  <!-- Frequency & exam count -->
  <div class="frequency">
    <span>{{Frequency}}</span>
    <span class="exam-count">기출 {{ExamCount}}회</span>
  </div>

</div>
</body>
</html>
